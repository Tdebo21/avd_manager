<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVD Manager (avdm) - CLI Documentation</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --primary-color: #007bff;
        --text-color: #333;
        --border-color: #eee;
        --code-theme-bg: #f4f4f4;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="app">Loading docs...</div>
    <script>
      window.$docsify = {
        name: "avdm CLI",
        repo: "https://github.com/Tdebo21/avd_manager",
        loadSidebar: true,
        sidebar: "_sidebar.md",
        loadNavbar: false,
        coverpage: false,
        auto2top: true,
        themeColor: "#007bff",
        search: {
          noData: "No results!",
          placeholder: "Search documentation...",
        },
        formatUpdated: "{MM}/{DD} {HH}:{mm}",
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-dart.min.js"></script>
  </body>
</html>
