<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVD Manager (avdm) - CLI Documentation</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link rel="icon" href="./assets/favicon.png" type="image/png" />
    <link rel="stylesheet" href="./theme.css" />
    <style>
      :root {
        --primary-color: #007bff;
        --text-color: #333;
        --border-color: #eee;
        --code-theme-bg: #f4f4f4;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <p id="check">
      _sidebar exists?
      <script>
        fetch("./_sidebar.md").then(
          (r) =>
            (document.getElementById("check").innerText = r.ok
              ? "_sidebar found"
              : "_sidebar missing"),
        );
      </script>
    </p>
    <div id="app"></div>
    <div id="theme-toggle">🌗 Toggle Theme</div>
    <script>
      const toggle = document.getElementById("theme-toggle");
      const currentTheme = localStorage.getItem("theme");

      if (currentTheme) {
        document.documentElement.setAttribute("data-theme", currentTheme);
      }

      toggle.addEventListener("click", () => {
        const theme =
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark";

        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      });
    </script>
    <script>
      window.$docsify = {
        name: "AVD Manager (avdm) CLI",
        repo: "https://github.com/Tdebo21/avd_manager",
        loadSidebar: true,
        homepage: "README.md",
        coverpage: true,
        auto2top: true,
        subMaxLevel: 2,
        sidebarDisplayLevel: 1,
        search: true,
        themeColor: "#007bff",
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
