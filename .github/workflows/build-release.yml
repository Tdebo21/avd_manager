name: Build and Create Release
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode (validates without creating release)"
        required: false
        type: boolean
        default: false
      bump:
        description: "Version bump type (major, minor, patch)"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
        default: "patch"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output-name: avdm-linux
          - os: windows-latest
            output-name: avdm-windows.exe
          - os: macos-latest
            output-name: avdm-macos
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        run: dart pub get

      - name: Build executable
        run: dart compile exe bin/avdm.dart -o ${{ matrix.output-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.output-name }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false') }}
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ubuntu-latest-build/avdm-linux
            artifacts/windows-latest-build/avdm-windows.exe
            artifacts/macos-latest-build/avdm-macos
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  version-and-changelog:
    name: Generate Changelog & Bump Version
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
      pull-requests: read
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm install
      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: npm publish ./npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN}}
       

      - name: Generate Changelog & Bump Version (Dry Run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        id: version-dry
        run: |
          npx standard-version --release-as ${{ github.event.inputs.bump }} --dry-run
          echo "DRY_RUN_COMPLETED=true" >> $GITHUB_OUTPUT

      - name: Generate Changelog & Bump Version
        if: ${{ github.event.inputs.dry_run == 'false' }}
        id: version
        run: |
          npx standard-version --release-as ${{ github.event.inputs.bump }} --skip.tag
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag (if not exists)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag -a "v$VERSION" -m "chore(release): $VERSION"
            git push origin "v$VERSION"
          else
            echo "Tag v$VERSION already exists, skipping tag creation"
          fi
      - name: Sync to pubspec.yaml
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/sync-versions.js

      - name: Push version bump and changelog
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry Run Summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "✅ Dry run completed successfully!"
          echo "Run the workflow again with 'Dry run mode' unchecked to create the actual release."

  update-homebrew:
    name: Update Homebrew Formula
    needs: [create-release]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          LINUX_SHA=$(sha256sum artifacts/ubuntu-latest-build/avdm-linux | awk '{print $1}')
          MACOS_SHA=$(sha256sum artifacts/macos-latest-build/avdm-macos | awk '{print $1}')
          WINDOWS_SHA=$(sha256sum artifacts/windows-latest-build/avdm-windows.exe | awk '{print $1}')
          echo "LINUX_SHA=$LINUX_SHA" >> $GITHUB_OUTPUT
          echo "MACOS_SHA=$MACOS_SHA" >> $GITHUB_OUTPUT
          echo "WINDOWS_SHA=$WINDOWS_SHA" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-avd_manager
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Configure Git user for Homebrew tap
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update Homebrew formula
        run: |
          cat > homebrew-tap/Formula/avd_manager.rb << 'EOF'
          class AvdManager < Formula
            desc "A Dart-based CLI tool for managing Android Virtual Devices (AVDs)"
            homepage "https://github.com/${{ github.repository }}"
            version "${{ steps.version.outputs.VERSION }}"

            on_macos do
              url "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/avdm-macos"
              sha256 "${{ steps.checksums.outputs.MACOS_SHA }}"
            end

            on_linux do
              url "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/avdm-linux"
              sha256 "${{ steps.checksums.outputs.LINUX_SHA }}"
            end

            license "MIT"
            
            def install
              bin.install "avdm-macos" => "avd_manager" if OS.mac?
              bin.install "avdm-linux" => "avd_manager" if OS.linux?
            end

            test do
              system "#{bin}/avd_manager", "--version"
            end
          end
          EOF

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git add Formula/avd_manager.rb
          git commit -m "chore: update avd_manager formula to v${{ steps.version.outputs.VERSION }}"
          git push origin main

  publish-to-pubdev:
    name: Publish to Pub.dev
    needs: [create-release]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        run: dart pub get

      - name: Publish to Pub.dev
        run: dart pub publish --force |
          echo "Publishing version ${{ needs.create-release.outputs.version }} to Pub.dev..."

        env:
          PUB_DEV_TOKEN: ${{ secrets.PUB_DEV_TOKEN }}
