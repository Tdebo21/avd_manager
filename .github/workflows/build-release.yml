name: Build and Create Release

on:
  push:
    tags:
      - "v*" # Trigger on version tags (v1.0.0, v1.1.0, etc.)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (validates without creating release)'
        required: false
        type: boolean
        default: true
      bump:
        description: 'Version bump type (major, minor, patch)'
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
        default: 'patch'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output-name: avdm-linux
            asset-name: avdm-linux
          - os: windows-latest
            output-name: avdm-windows.exe
            asset-name: avdm-windows.exe
          - os: macos-latest
            output-name: avdm-macos
            asset-name: avdm-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        run: dart pub get

      - name: Build executable
        run: dart compile exe bin/avdm.dart -o ${{ matrix.output-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.output-name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !github.event.inputs.dry_run) }}
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ubuntu-latest-build/avdm-linux
            artifacts/windows-latest-build/avdm-windows.exe
            artifacts/macos-latest-build/avdm-macos
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: npm install

      - name: Generate Changelog & Bump Version (Manual - Dry Run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        id: version-dry
        run: |
          npx standard-version --release-as ${{ github.event.inputs.bump }} --dry-run
          echo "DRY_RUN_COMPLETED=true" >> $GITHUB_OUTPUT

      - name: Generate Changelog & Bump Version (Manual)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' }}
        id: version-manual
        run: |
          npx standard-version --release-as ${{ github.event.inputs.bump }}
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog & Bump Version (Auto - Push)
        if: ${{ github.event_name == 'push' }}
        id: version-auto
        run: |
          npx standard-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Dry Run Summary
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          echo "✅ Dry run completed successfully!"
          echo "Run the workflow again with 'Dry run mode' unchecked to create the actual release."

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !github.event.inputs.dry_run) }}

    steps:
      - name: Trigger Homebrew update
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // This creates an issue reminder to update the Homebrew formula with the new version and SHA256
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Update Homebrew formula for version ${process.env.GITHUB_REF.replace("refs/tags/v", "")}`,
              body: `A new release has been created for version ${process.env.GITHUB_REF.replace("refs/tags/v", "")}. Please update the Homebrew formula with the new version and the correct SHA256 checksum for the new release.`
            });
            console.log("Remember to update the Homebrew formula with new SHA256");

        
